name: Sync, Build & Publish calendars to GitHub Pages

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build calendars and publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync Google Sheets to data/
        id: sync
        run: |
          python3 scripts/sync_sheets.py || true

      - name: Build ICS calendars into output/
        id: build
        run: |
          python3 scripts/build.py

      - name: Prepare public/ for Pages
        run: |
          mkdir -p public
          # copy landing page (preserve from source)
          if [ -f public/index.html ]; then cp -v public/index.html public/index.html.bak; fi
          # copy ICS files
          cp -v output/*.ics public/ || true
          # expose CSVs too for browsing
          mkdir -p public/data
          cp -v data/*.csv public/data/ || true
          # ensure landing page exists
          if [ ! -f public/index.html ]; then
            echo "WARNING: public/index.html not found!"
          fi

      - name: Diagnostics - public/ listing
        if: always()
        run: |
          echo "=== public/ listing ==="
          ls -la public || true
          echo "=== sizes ==="
          du -sh public || true
          echo "=== head of public/graduation.ics (if present) ==="
          if [ -f public/graduation.ics ]; then head -n 40 public/graduation.ics; else echo "NO graduation.ics"; fi

      - name: Commit updated CSVs and ICS (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # check for changes
          git add data/*.csv output/*.ics || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated sync and calendar build [ci skip]" || true
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "Committed and pushed changes."
          else
            echo "No content changes to commit."
          fi

      - name: Upload pages artifact (official)
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages (official)
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        if: always()
        run: |
          echo "Deployment finished; check Settings → Pages → Deployments and site URL."

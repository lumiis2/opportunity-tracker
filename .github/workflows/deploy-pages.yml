name: Build and deploy public/ to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate ICS calendars into public/
        run: |
          mkdir -p public
          # Generate all registered calendars into public/
          opportunity-calendar generate --lead-months 1

      - name: Show public contents
        run: ls -la public || true

      - name: Deploy `public/` to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

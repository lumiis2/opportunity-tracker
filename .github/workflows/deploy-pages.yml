name: Build & Publish public/ to GitHub Pages (official)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build calendars and publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate ICS calendars into public/
        id: generate
        run: |
          mkdir -p public
          opportunity-calendar generate --lead-months 1

      - name: Diagnostics - public/ listing
        if: always()
        run: |
          echo "=== public/ listing ==="
          ls -la public || true
          echo "=== sizes ==="
          du -sh public || true
          echo "=== head of graduation.ics (if present) ==="
          if [ -f public/graduation.ics ]; then head -n 40 public/graduation.ics; else echo "NO graduation.ics"; fi

      - name: Fail if public/ is empty
        run: |
          count=$(find public -type f | wc -l)
          echo "files_in_public=$count"
          if [ "$count" -eq "0" ]; then
            echo "ERROR: 'public/' is empty. Aborting deployment."
            exit 1
          fi

      - name: Upload pages artifact (official)
        uses: actions/upload-pages-artifact@v2
        with:
          path: public

      - name: Deploy to GitHub Pages (official)
        id: deploy
        uses: actions/deploy-pages@v1

      - name: Deployment summary
        if: always()
        run: |
          echo "Deployment finished; check Settings → Pages → Deployments and site URL."
